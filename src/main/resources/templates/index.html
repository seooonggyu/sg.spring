<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>테스트 네비게이션</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fc; /* SB Admin 2 배경색 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .nav-container {
            background: #ffffff;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        .header-section {
            text-align: center;
            margin-bottom: 35px;
        }
        .header-section h2 {
            color: #4e73df;
            margin: 0;
            font-weight: 900;
            letter-spacing: 1px;
        }
        .header-section p {
            color: #858796;
            font-size: 14px;
            margin-top: 10px;
            margin-bottom: 0;
        }
        .menu-group {
            margin-bottom: 30px;
        }
        .menu-group h4 {
            font-size: 13px;
            color: #b7b9cc;
            text-transform: uppercase;
            margin-bottom: 12px;
            border-bottom: 1px solid #e3e6f0;
            padding-bottom: 8px;
            font-weight: bold;
        }
        .nav-btn {
            display: block;
            width: 100%;
            padding: 14px 15px;
            background-color: #f8f9fc;
            color: #4e73df;
            border: 1px solid #e3e6f0;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 10px;
            transition: all 0.2s ease-in-out;
            box-sizing: border-box;
        }
        .nav-btn i {
            width: 25px;
            text-align: center;
            margin-right: 8px;
        }
        /* 호버(마우스 올렸을 때) 액션 */
        .nav-btn:hover {
            background-color: #4e73df;
            color: white;
            text-decoration: none;
            box-shadow: 0 5px 15px rgba(78, 115, 223, 0.2);
            transform: translateY(-2px);
        }
        /* 관리자 로그인 버튼은 붉은색 포인트 */
        .nav-btn.admin {
            color: #e74a3b;
        }
        .nav-btn.admin:hover {
            background-color: #e74a3b;
            color: white;
            border-color: #e74a3b;
            box-shadow: 0 5px 15px rgba(231, 74, 59, 0.2);
        }
        /* 토큰 초기화 버튼 */
        .nav-btn.clear-btn {
            color: #858796;
            background-color: #ffffff;
            cursor: pointer;
            text-align: left;
        }
        .nav-btn.clear-btn:hover {
            background-color: #858796;
            color: white;
            border-color: #858796;
        }
    </style>
</head>
<body>

<div class="nav-container">
    <div class="header-section">
        <h2><i class="fas fa-route"></i> TEST PORTAL</h2>
        <p>원하는 테스트 페이지를 선택해 주세요.</p>
    </div>

    <div class="menu-group">
        <h4><i class="fas fa-user-lock"></i> Auth (인증 및 회원)</h4>
        <a href="/user/login" class="nav-btn"><i class="fas fa-sign-in-alt"></i> 일반 로그인</a>
        <a href="/user/signup" class="nav-btn"><i class="fas fa-user-plus"></i> 회원 가입</a>
        <a href="/user/admlogin" class="nav-btn admin"><i class="fas fa-user-shield"></i> 관리자(Admin) 로그인</a>
    </div>

    <div class="menu-group">
        <h4><i class="fas fa-key"></i> Permission (권한 관리)</h4>
        <a href="/permission/admin_list" class="nav-btn"><i class="fas fa-list"></i> 권한 조회 (목록 보기)</a>
        <a href="/permission/admin_create" class="nav-btn"><i class="fas fa-plus-circle"></i> 권한 생성</a>
    </div>

    <div class="menu-group" style="margin-bottom: 0;">
        <h4><i class="fas fa-tools"></i> Helper (테스트 도구)</h4>
        <button onclick="clearToken()" class="nav-btn clear-btn">
            <i class="fas fa-eraser"></i> 브라우저 토큰 초기화 (로그아웃)
        </button>
    </div>
</div>

<script>
    // 테스트 중 꼬였을 때 로컬스토리지를 깨끗하게 비워주는 헬퍼 함수
    function clearToken() {
        localStorage.removeItem('accessToken');
        localStorage.removeItem('refreshToken');
        alert('발급받았던 JWT 토큰이 모두 삭제되었습니다.\n(로그아웃 상태로 초기화)');
    }
</script>

</body>
</html>
