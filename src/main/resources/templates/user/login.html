<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인</title>
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
    <style>
        /* signup/admlogin과 통일된 스타일 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6; /* signup과 동일한 연회색 배경 */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: #ffffff;
            padding: 50px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }
        .logo-section {
            text-align: center;
            margin-bottom: 35px;
        }
        .font-logo {
            font-size: 32px;
            font-weight: 900;
            color: #4e73df; /* admlogin과 동일한 블루 포인트 */
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .sub-title {
            color: #858796;
            font-size: 14px;
            font-weight: bold;
            margin-top: 8px;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 13px;
            font-weight: bold;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 15px;
            border: 1px solid #d1d3e2;
            border-radius: 8px; /* signup 스타일의 사각형 굴곡 */
            box-sizing: border-box;
            font-size: 14px;
            color: #6e707e;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #4e73df;
            outline: none;
            box-shadow: 0 0 5px rgba(78, 115, 223, 0.2);
        }
        .btn_login {
            width: 100%;
            padding: 15px;
            background-color: #4e73df;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            margin-top: 10px;
            transition: background-color 0.3s;
        }
        .btn_login:hover {
            background-color: #2e59d9;
        }
        .signup-link-container {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
        }
        .signup-link-container a {
            color: #4e73df;
            text-decoration: none;
            font-weight: bold;
        }
        .signup-link-container a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="logo-section">
        <div class="font-logo"><i class="fas fa-user-circle"></i> USER LOGIN</div>
    </div>

    <div class="form-group">
        <label for="create_user_username">아이디</label>
        <input type="text" id="create_user_username" placeholder="아이디 입력">
    </div>
    <div class="form-group">
        <label for="create_user_password">비밀번호</label>
        <input type="password" id="create_user_password" placeholder="비밀번호 입력">
    </div>

    <button class="btn_login" onclick="login_user()">로그인</button>

    <div class="signup-link-container">
        <span style="color: #858796;">계정이 없으신가요?</span>
        <a href="/user/signup">회원가입 하러 가기</a>
    </div>
</div>

<script>
    // 기존 기능 로직 유지
    function login_user(){
        let _data = {};
        _data["username"] = $("#create_user_username").val();
        _data["password"] = $("#create_user_password").val();
        $.ajax({
            url: "/api/login",
            method: "POST",
            contentType : 'application/json; charset=utf-8',
            data: JSON.stringify(_data),
            success: (data, status, xhr)=>{
                let refreshToken = xhr.getResponseHeader("RefreshToken");
                if(refreshToken != null && refreshToken.length < 20){
                    refreshToken = null;
                }
                if(refreshToken === null || refreshToken === "" || Number(refreshToken) <= 0){
                    alert("로그인 실패");
                } else {
                    localStorage.setItem("refreshToken", refreshToken);
                    // alert("refreshToken : " + refreshToken); // 테스트 후 주석 처리 권장
                    getAccessToken();
                }
            },
            error: (data, status, xhr)=>{
                alert("로그인 정보가 올바르지 않습니다.");
            },
        });
    }

    function getAccessToken(){
        $.ajax({
            url: "/api/auth",
            method: "POST",
            beforeSend : function(xhr){
                let refreshToken = localStorage.getItem("refreshToken");
                xhr.setRequestHeader("RefreshToken", refreshToken);
            },
            contentType : 'application/json; charset=utf-8',
            success: (data, status, xhr)=>{
                let accessToken = xhr.getResponseHeader("Authorization");
                localStorage.setItem("accessToken", accessToken);
                // alert("accessToken : " + accessToken); // 테스트 후 주석 처리 권장
                alert("로그인 성공");
                location.replace('/index');
            },
            error: (data, status, xhr)=>{
                alert("인증 세션 획득에 실패했습니다.");
            },
        });
    }
</script>

</body>
</html>
